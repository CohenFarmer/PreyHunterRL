behaviors:
  ArcheryHunter:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 8192
      learning_rate: 3.0e-4
      beta: 0.01           # bumped from 0.005 to 0.01 — more exploration to break weird habits
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 60000000
    time_horizon: 128
    summary_freq: 5000

# Joint curriculum: all difficulty dimensions vary together.
# Movement always present from phase 1, distance variation always present.
# Size reduces only after phase 6. Multi-target only in final phases.
# Reward-based advancement: don't move on until policy is solid.
environment_parameters:
  archery_phase:
    curriculum:
      - name: phase_1
        completion_criteria:
          measure: reward
          behavior: ArcheryHunter
          threshold: 30
          min_lesson_length: 100
          signal_smoothing: true
        value: 1.0
