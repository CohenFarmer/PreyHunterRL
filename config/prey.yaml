behaviors:
  Prey:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 1.0e-4
      beta: 0.02
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: constant
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10000000
    time_horizon: 512
    summary_freq: 5000

# Curriculum: arena width grows by 1 every 50k trainer steps.
# Reaches max width 50 at step 1,750,000. Stays at 50 for the rest of training.
# `measure: progress` = current_step / max_steps. 50k of 5M = 0.01 progress per lesson.
environment_parameters:
  arena_width:
    curriculum:
      - name: w15
        completion_criteria:
          measure: progress
          behavior: Prey
          threshold: 0.0400  # advance at step 50000
          min_lesson_length: 0
          signal_smoothing: true
        value: 15.0
